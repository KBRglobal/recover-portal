<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>MyKeyz Claim</title>
<meta name="theme-color" content="#0A2540">
<link rel="icon" href="data:,">
<style>
  :root{
    --navy:#0A2540; --navy-deep:#061A2C; --navy-soft:#1f3a5c; --fog:#F4F8FA;
    --ink:#0F172A; --muted:#5b6b7d; --faint:#8a97a6; --line:#e4e9ef; --line-soft:#eef2f6;
    --white:#fff; --ok:#15803d; --ok-bg:#f0fdf5; --ok-line:#c6ebd3; --brass:#b78a4a;
    --err:#b4341f;
    --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{min-height:100vh;background:var(--white);color:var(--ink);font-family:var(--sans);
       -webkit-font-smoothing:antialiased;line-height:1.6;
       display:flex;align-items:center;justify-content:center;padding:32px}
  .wrap{width:100%;max-width:440px;text-align:center}
  .brand{display:inline-flex;align-items:center;gap:10px;margin-bottom:28px;text-decoration:none}
  .brand .name{font-size:18px;font-weight:800;color:var(--navy);letter-spacing:-0.3px}
  .brand .name span{color:var(--faint);font-weight:600}
  .card{background:var(--white);border:1px solid var(--line);border-radius:22px;padding:34px 30px;
        box-shadow:0 30px 60px -36px rgba(10,37,64,0.28)}
  .ic{width:60px;height:60px;border-radius:16px;background:var(--fog);border:1px solid var(--line);
      display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
  .ic svg{width:30px;height:30px;color:var(--navy)}
  h1{font-size:23px;line-height:1.2;letter-spacing:-0.5px;color:var(--navy);margin:0 0 10px;font-weight:800}
  p{font-size:15px;color:var(--muted);margin:0 auto;max-width:360px}
  p.hint{font-size:13px;color:var(--faint);margin-top:14px}
  .spinner{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--navy);border-radius:50%;animation:spin .9s linear infinite;margin:0 auto}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err h1{color:var(--err)}
  .foot{color:var(--faint);font-size:12px;margin-top:22px}
</style>
</head>
<body>
  <div class="wrap">
    <a class="brand" href="#" aria-label="MyKeyz Claim">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="9" cy="9" r="5" stroke="#0A2540" stroke-width="1.9"/>
        <path d="M12.6 12.6 20 20M16.5 16.5l2-2M14.5 14.5l2-2" stroke="#0A2540" stroke-width="1.9" stroke-linecap="round"/>
      </svg>
      <div class="name">MyKeyz <span>Claim</span></div>
    </a>
    <div class="card" id="card"><div class="spinner"></div></div>
    <div class="foot">A private link, just for your tenancy record.</div>
  </div>

<script>
const API = 'https://api.mykeyz.io/v1';
const card = document.getElementById('card');

const lockIcon = '<div class="ic"><svg viewBox="0 0 24 24" fill="none"><path d="M6 10V8a6 6 0 0 1 12 0v2M5 10h14v10H5z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg></div>';

// Cold visitor with no/invalid grant → locked shell, nothing else. Entry is only
// from inside the MyKeyz app ("Start a claim" → emails this private link).
function locked(){
  card.innerHTML = lockIcon +
    '<h1>This page opens from your app</h1>' +
    '<p>The claim workspace opens from inside the MyKeyz app, once you have a completed tenancy record.</p>' +
    '<p class="hint">Open the app, tap “Start a claim”, and we’ll email you a private link to continue here.</p>';
}
function expired(){
  card.className = 'card err';
  card.innerHTML = lockIcon +
    '<h1>This link has expired</h1>' +
    '<p>For your security the link is short-lived. Reopen the claim from the MyKeyz app to get a fresh one.</p>';
}
function checking(){
  card.innerHTML = '<div class="spinner"></div><p style="margin-top:16px">Checking your access…</p>';
}

async function run(){
  const t = new URLSearchParams(location.search).get('t');
  if(!t || t.length < 10){ locked(); return; }
  checking();
  try{
    const r = await fetch(API+'/claim/redeem',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ token: t }),
    });
    const b = await r.json().catch(()=>({}));
    if(r.ok && b && b.authorized && b.session){
      // Authorized: keep the claim session for the workspace's API calls.
      sessionStorage.setItem('mk_web_token', b.session);          // tab-scoped
      if(b.publicRef) sessionStorage.setItem('mk_public_ref', b.publicRef);
      card.innerHTML = '<div class="ic" style="background:var(--ok-bg);border-color:var(--ok-line)"><svg viewBox="0 0 24 24" fill="none"><path d="M20 6 9 17l-5-5" stroke="#15803d" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></div><h1>Access confirmed</h1><p>Opening your claim workspace…</p>';
      // Strip the token from the URL before handing off (don't leave it in history).
      history.replaceState(null,'',location.pathname);
      setTimeout(()=>{ location.href = './workspace.html'; }, 900);
      return;
    }
    expired();
  }catch{
    card.className = 'card err';
    card.innerHTML = lockIcon + '<h1>Something went wrong</h1><p>Please reopen the claim from the MyKeyz app.</p>';
  }
}
run();
</script>
</body>
</html>
